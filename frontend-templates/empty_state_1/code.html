<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aasila - Empty State</title>
<!-- Google Fonts: Inter & Material Symbols -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#13ec83",
              "background-light": "#f6f8f7",
              "background-dark": "#102219",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem", // 4px strict radius for soft industrial
              "lg": "0.25rem",
              "xl": "0.25rem",
              "full": "0.25rem"
            },
          },
        },
      }
    </script>
<style>
        /* Utility for Material Symbols */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Soft Industrial base styles */
        body {
            background-color: theme('colors.background-light');
            color: #27272A; /* Zinc 800 equivalent for high legibility */
        }
    </style>
</head>
<body class="font-display flex h-screen w-full overflow-hidden selection:bg-primary/30">
<!-- Sidebar Container (260px) - Matte Gray -->
<aside class="w-[260px] h-full bg-zinc-200/70 border-r border-zinc-300 flex flex-col flex-shrink-0">
<!-- Sidebar Header -->
<div class="p-4 flex items-center h-14">
<h1 class="text-zinc-800 text-base font-semibold tracking-wide">Aasila</h1>
</div>
<!-- Sidebar Content -->
<div class="px-4 py-2 flex-1 flex flex-col gap-2">
<!-- New Workspace Button -->
<button class="w-full bg-zinc-300/80 hover:bg-zinc-300 text-zinc-900 font-medium py-2 px-3 rounded flex items-center justify-center transition-colors border border-transparent">
<span class="text-sm">+ New Workspace</span>
</button>
<!-- Navigation Links (Contextual from Shared Components logic) -->
<nav class="mt-4 flex flex-col gap-1">
<a class="flex items-center gap-3 px-3 py-2 rounded bg-zinc-300/50 text-zinc-900 transition-colors" href="#">
<span class="material-symbols-outlined text-sm" data-icon="dashboard">dashboard</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded text-zinc-600 hover:bg-zinc-300/30 hover:text-zinc-900 transition-colors" href="#">
<span class="material-symbols-outlined text-sm" data-icon="workspaces">workspaces</span>
<span class="text-sm font-medium">My Workspaces</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded text-zinc-600 hover:bg-zinc-300/30 hover:text-zinc-900 transition-colors" href="#">
<span class="material-symbols-outlined text-sm" data-icon="settings">settings</span>
<span class="text-sm font-medium">Settings</span>
</a>
</nav>
</div>
</aside>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col relative bg-background-light">
<!-- Centered Welcome Area -->
<div class="flex-1 flex flex-col items-center justify-center p-8 pb-32">
<!-- Welcome Prompt -->
<h2 class="text-zinc-800 text-2xl font-semibold mb-8 text-center">
                How can I assist your department today?
            </h2>
<!-- Suggestion Chips Grid -->
<div class="grid grid-cols-2 gap-4 max-w-[400px]">
<button class="w-[160px] h-[80px] bg-white border border-zinc-300 rounded hover:bg-zinc-100 flex items-center justify-center p-4 text-center transition-colors group">
<span class="text-sm text-zinc-800 font-medium group-hover:text-zinc-900">Summarize regulation</span>
</button>
<button class="w-[160px] h-[80px] bg-white border border-zinc-300 rounded hover:bg-zinc-100 flex items-center justify-center p-4 text-center transition-colors group">
<span class="text-sm text-zinc-800 font-medium group-hover:text-zinc-900">Draft memo</span>
</button>
<button class="w-[160px] h-[80px] bg-white border border-zinc-300 rounded hover:bg-zinc-100 flex items-center justify-center p-4 text-center transition-colors group">
<span class="text-sm text-zinc-800 font-medium group-hover:text-zinc-900">Analyze dataset</span>
</button>
<button class="w-[160px] h-[80px] bg-white border border-zinc-300 rounded hover:bg-zinc-100 flex items-center justify-center p-4 text-center transition-colors group">
<span class="text-sm text-zinc-800 font-medium group-hover:text-zinc-900">Review policy</span>
</button>
</div>
</div>
<!-- Sticky Bottom Input Area -->
<div class="absolute bottom-8 left-0 w-full px-6 flex justify-center">
<div class="w-full max-w-[768px] relative">
<input class="w-full bg-white border border-zinc-300 rounded py-4 pl-4 pr-12 text-zinc-900 placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow shadow-sm" placeholder="Message Aasila..." type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-primary hover:text-emerald-500 transition-colors flex items-center justify-center rounded">
<span class="material-symbols-outlined" data-icon="send" data-weight="fill" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</main>
</body></html>
